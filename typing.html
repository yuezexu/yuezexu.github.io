<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全拼指法训练 | Pinyin Typing Trainer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ===================================================
       CSS Variables & Reset
    =================================================== */
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #e8eaed;
            --primary: #1a73e8;
            /* Google blue */
            --primary-l: #e8f0fe;
            --success: #34a853;
            /* Google green */
            --success-l: #e6f4ea;
            --error: #ea4335;
            /* Google red */
            --error-l: #fce8e6;
            --text: #202124;
            --muted: #5f6368;
            --shadow: 0 2px 8px rgba(0, 0, 0, .08);
            --radius: 12px;

            /* Finger colour palette */
            --f-pinky: #9c27b0;
            --f-ring: #2196f3;
            --f-middle: #4caf50;
            --f-index: #ff9800;
            --f-thumb: #f44336;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 48px;
        }

        /* ===================================================
       Header / Nav back
    =================================================== */
        .top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .back-link {
            text-decoration: none;
            color: var(--muted);
            font-size: .9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color .2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .top-bar h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        /* Top-right controls (for Login) */
        .top-right-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Auth button */
        .auth-btn {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background-color: var(--surface);
            color: var(--muted);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .auth-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background-color: var(--primary-l);
        }

        .auth-btn--user {
            color: var(--primary);
            border-color: var(--primary);
            background-color: var(--primary-l);
        }

        .auth-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Auth modal Styles */
        .auth-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 44px 40px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .auth-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .auth-modal-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .auth-modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .auth-modal-desc {
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .auth-modal-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .auth-provider-btn {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .auth-provider-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-l);
        }

        .auth-provider-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===================================================
       Mode Selector
    =================================================== */
        .mode-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .mode-btn.active,
        .mode-btn:hover {
            background: var(--primary-l);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===================================================
       Target Display (the word to type)
    =================================================== */
        .target-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 36px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
        }

        .target-label {
            font-size: .8rem;
            font-weight: 600;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .target-word {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .char-box {
            width: 48px;
            height: 56px;
            border-radius: 10px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all .18s;
            background: var(--surface);
            color: var(--text);
        }

        .char-box.active {
            border-color: var(--primary);
            background: var(--primary-l);
            color: var(--primary);
            transform: scale(1.1);
        }

        .char-box.done {
            border-color: var(--success);
            background: var(--success-l);
            color: var(--success);
        }

        .char-box.wrong {
            border-color: var(--error);
            background: var(--error-l);
            color: var(--error);
            animation: shake .25s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .status-hint {
            font-size: .95rem;
            color: var(--muted);
            min-height: 1.4em;
        }

        .status-hint span {
            font-weight: 600;
            color: var(--primary);
        }

        /* ===================================================
       Progress bar
    =================================================== */
        .progress-wrap {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #8ab4f8);
            border-radius: 3px;
            transition: width .3s ease;
            width: 0%;
        }

        .progress-label {
            font-size: .82rem;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ===================================================
       Main layout: keyboard + hands side-by-side
    =================================================== */
        .trainer-layout {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        /* ===================================================
       SVG Keyboard
    =================================================== */
        .keyboard-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .keyboard-svg-wrap {
            width: 100%;
            overflow-x: auto;
        }

        #keyboard-svg {
            width: 100%;
            min-width: 500px;
        }

        /* Key base style (applied in JS to <rect> elements) */
        .key-rect {
            fill: var(--bg);
            stroke: var(--border);
            stroke-width: 1.5;
            rx: 8;
            transition: fill .15s;
        }

        .key-text {
            font-size: 13px;
            font-weight: 600;
            fill: var(--text);
            pointer-events: none;
            font-family: 'Inter', sans-serif;
        }

        .key-sub {
            font-size: 9px;
            font-weight: 400;
            fill: var(--muted);
            pointer-events: none;
            font-family: 'Inter', sans-serif;
        }

        /* Finger colour classes on rects */
        .fing-pinky {
            fill: #f3e5f5;
            stroke: var(--f-pinky);
        }

        .fing-ring {
            fill: #e3f2fd;
            stroke: var(--f-ring);
        }

        .fing-middle {
            fill: #e8f5e9;
            stroke: var(--f-middle);
        }

        .fing-index {
            fill: #fff3e0;
            stroke: var(--f-index);
        }

        .fing-thumb {
            fill: #fce4ec;
            stroke: var(--f-thumb);
        }

        /* Active key highlight */
        .key-active {
            fill: var(--primary) !important;
            stroke: #0d47a1 !important;
        }

        .key-active~.key-text {
            fill: #fff !important;
        }

        /* Finger colour legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: .78rem;
            color: var(--muted);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* ===================================================
       Hand Diagram (SVG) – below keyboard
    =================================================== */
        .hands-section {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px 24px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 0;
            width: 100%;
            max-width: 800px;
        }

        .hands-title {
            font-size: .78rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .06em;
            text-transform: uppercase;
        }

        #hands-svg {
            width: 100%;
            max-width: 520px;
        }

        .ftip {
            transition: fill .15s, r .15s, opacity .2s;
        }

        .ftip.lit {
            r: 13;
        }

        /* ===================================================
       Next Word button
    =================================================== */
        .btn-next {
            margin-top: 20px;
            padding: 12px 32px;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
            display: none;
            /* shown when word is complete */
        }

        .btn-next:hover {
            background: #1557b0;
            transform: translateY(-1px);
        }

        /* ===================================================
       Responsive
    =================================================== */
        @media (max-width: 680px) {
            .hands-section {
                flex-direction: row;
                justify-content: center;
            }

            #hands-svg {
                max-width: 140px;
            }
        }
    </style>
</head>

<body>

    <!-- Top navigation -->
    <div class="top-bar">
        <a href="index.html" class="back-link">← 返回主页</a>
        <h1>⌨️ 全拼指法训练</h1>
        <div class="top-right-controls">
            <div id="auth-btn-container"></div>
        </div>
    </div>

    <!-- Mode selector -->
    <div class="mode-bar">
        <button class="mode-btn active" id="btn-homerow" onclick="setMode('homerow')">
            Home Row 入门
        </button>
        <button class="mode-btn" id="btn-pinyin" onclick="setMode('pinyin')">
            全拼单词练习
        </button>
        <button class="mode-btn" id="btn-speedtest" onclick="location.href='chinese-typing.html'">
            🚀 中文速度测试
        </button>
    </div>

    <!-- Target word display -->
    <div class="target-card">
        <div class="target-label">请依次键入下方字母</div>
        <div class="target-word" id="target-word"></div>
        <div class="status-hint" id="status-hint">准备好后，按下第一个字母开始</div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">0 / 0</div>
    </div>

    <!-- Keyboard -->
    <div class="trainer-layout">
        <div class="keyboard-card">
            <div class="keyboard-svg-wrap">
                <svg id="keyboard-svg" viewBox="0 0 620 220" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            <div class="legend" id="legend"></div>
        </div>
    </div>

    <!-- Hand diagram – below keyboard -->
    <div class="hands-section">
        <div class="hands-title">指法示意</div>
        <svg id="hands-svg" viewBox="0 0 520 230" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- Next word button -->
    <button class="btn-next" id="btn-next" onclick="nextWord()">下一个词 →</button>

    <script type="module" src="auth.js"></script>
    <script>
        /* ====================================================
           DATA: Keyboard Layout & Finger Map
        ==================================================== */

        // QWERTY layout rows. Each entry: [key, finger]
        // finger: lp=left-pinky, lr=left-ring, lm=left-middle, li=left-index
        //         lt=left-thumb, rt=right-thumb, ri=right-index, rm=right-middle
        //         rr=right-ring, rp=right-pinky
        const ROWS = [
            // Number row (not interactive for typing practice, shown for reference)
            [['`', 'lp'], ['1', 'lp'], ['2', 'lr'], ['3', 'lm'], ['4', 'li'], ['5', 'li'], ['6', 'ri'], ['7', 'ri'], ['8', 'rm'], ['9', 'rr'], ['0', 'rp'], ['-', 'rp'], ['=', 'rp']],
            // QWERTY  
            [['Q', 'lp'], ['W', 'lr'], ['E', 'lm'], ['R', 'li'], ['T', 'li'], ['Y', 'ri'], ['U', 'ri'], ['I', 'rm'], ['O', 'rr'], ['P', 'rp'], ['[', 'rp'], [']', 'rp']],
            // Home row
            [['A', 'lp'], ['S', 'lr'], ['D', 'lm'], ['F', 'li'], ['G', 'li'], ['H', 'ri'], ['J', 'ri'], ['K', 'rm'], ['L', 'rr'], [';', 'rp'], ["'", 'rp']],
            // Bottom
            [['Z', 'lp'], ['X', 'lr'], ['C', 'lm'], ['V', 'li'], ['B', 'li'], ['N', 'ri'], ['M', 'ri'], [',', 'rp'], ['.', 'rp'], ['/', 'rp']],
        ];

        // Maps a letter to its hand+finger code
        const fingerMap = {};
        ROWS.forEach(row => row.forEach(([k, f]) => { fingerMap[k.toUpperCase()] = f; }));
        fingerMap[' '] = 'lt'; // Space bar = left/right thumb

        // Human-readable finger names
        const fingerName = {
            lp: '左手小指', lr: '左手无名指', lm: '左手中指', li: '左手食指',
            lt: '大拇指',
            rt: '大拇指', ri: '右手食指', rm: '右手中指', rr: '右手无名指', rp: '右手小指',
        };
        const fingerColor = {
            lp: '#9c27b0', lr: '#2196f3', lm: '#4caf50', li: '#ff9800', lt: '#f44336',
            rt: '#f44336', ri: '#ff9800', rm: '#4caf50', rr: '#2196f3', rp: '#9c27b0',
        };
        const fingerClass = {
            lp: 'fing-pinky', lr: 'fing-ring', lm: 'fing-middle', li: 'fing-index', lt: 'fing-thumb',
            rt: 'fing-thumb', ri: 'fing-index', rm: 'fing-middle', rr: 'fing-ring', rp: 'fing-pinky',
        };

        /* ====================================================
           DATA: Word/Phrase Lists
        ==================================================== */
        const WORD_LISTS = {
            homerow: [
                'asdf', 'jkl', 'fdsajkl', 'asdfjkl', 'fjdk', 'slak', 'flask', 'salad', 'flag',
                'glad', 'half', 'lash', 'dash', 'asks', 'fall', 'hall', 'lass',
            ],
            pinyin: [
                'nihao', 'xuexi', 'shijie', 'zhongguo', 'putonghua', 'jiantizi',
                'kaishi', 'jieshu', 'xuesheng', 'laoshi', 'pengyou', 'jiating',
                'gongzuo', 'shenghuo', 'yundong', 'yinyue', 'dianying', 'meishi',
                'lvxing', 'jiandao', 'wenhua', 'kehuan', 'zhuyin', 'pinyin',
            ],
        };

        /* ====================================================
           STATE
        ==================================================== */
        let currentMode = 'homerow';
        let wordList = [];
        let wordIndex = 0;
        let currentWord = '';
        let charIndex = 0;
        let wordsDone = 0;
        let totalWords = 0;

        /* ====================================================
           AUDIO – simple beep via Web Audio API
        ==================================================== */
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
        function beep(freq = 440, type = 'sine', duration = 0.08, vol = 0.15) {
            ensureAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function playOK() { beep(880, 'sine', 0.06, 0.1); }
        function playError() { beep(220, 'square', 0.15, 0.2); }

        /* ====================================================
           SVG KEYBOARD
        ==================================================== */
        const svg = document.getElementById('keyboard-svg');

        // Layout geometry
        const KY = [28, 66, 104, 142, 180]; // row top-Y positions (shifted down 20px for zone labels)
        const KH = 32; // key height
        const KW = 40; // default key width
        const KG = 4;  // gap
        const ZONE_GAP = 4; // Extra gap (Total split gap = KG + ZONE_GAP = 8px)

        function isRightZone(row, col) {
            if (row === 0) return col >= 6; // Row 0 split after '5'
            return col >= 5; // Rows 1, 2, 3 split after 'T', 'G', 'B'
        }

        // Offsets per row to simulate real keyboard stagger
        const offsets = [0, 0, 6, 10, 18];

        function keyX(row, col) {
            let x = offsets[row] + col * (KW + KG) + 8;
            if (isRightZone(row, col)) x += ZONE_GAP;
            return x;
        }

        // We only interactively care about letter rows (rows 1-3) + space
        // Build a lookup: letter -> SVG group id
        const keyElements = {}; // letter -> { rect, text }

        ROWS.forEach((row, rowIdx) => {
            row.forEach(([k, finger], colIdx) => {
                const x = keyX(rowIdx, colIdx);
                const y = KY[rowIdx];
                const isLetter = /^[A-Z]$/i.test(k);

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.id = 'key-' + k.toUpperCase();

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', KW); rect.setAttribute('height', KH);
                rect.setAttribute('rx', 8);
                rect.setAttribute('fill', isLetter ? colorForFinger(finger) : '#eee');
                rect.setAttribute('stroke', isLetter ? darkenColor(finger) : '#ccc');
                rect.setAttribute('stroke-width', 1.5);
                rect.style.transition = 'fill .15s, stroke .15s';

                const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                txt.setAttribute('x', x + KW / 2); txt.setAttribute('y', y + KH / 2 + 5);
                txt.setAttribute('text-anchor', 'middle');
                txt.setAttribute('fill', '#333');
                txt.setAttribute('font-size', 13);
                txt.setAttribute('font-weight', 600);
                txt.setAttribute('font-family', 'Inter, sans-serif');
                txt.setAttribute('pointer-events', 'none');
                txt.textContent = k.toUpperCase();

                g.appendChild(rect); g.appendChild(txt);
                svg.appendChild(g);

                if (isLetter) keyElements[k.toUpperCase()] = { rect, txt, origFill: colorForFinger(finger), origStroke: darkenColor(finger) };
            });
        });

        // Space bar - Unified
        {
            const x = 80, y = KY[4], w = 240 + ZONE_GAP, h = KH;
            const g = svgEl('g', { id: 'key-SPACE' }, svg);
            const rect = svgEl('rect', {
                x, y, width: w, height: h, rx: 8,
                fill: '#fce4ec', stroke: '#f44336', 'stroke-width': 1.5
            }, g);
            const txt = svgEl('text', {
                x: x + w / 2, y: y + h / 2 + 5, 'text-anchor': 'middle',
                fill: '#333', 'font-size': 12, 'font-family': 'Inter,sans-serif'
            }, g);
            txt.textContent = 'SPACE';

            keyElements['SPACE'] = { rect, txt, origFill: '#fce4ec', origStroke: '#f44336' };
        }

        function colorForFinger(f) {
            const m = { lp: '#f3e5f5', lr: '#e3f2fd', lm: '#e8f5e9', li: '#fff3e0', lt: '#fce4ec', rt: '#fce4ec', ri: '#fff3e0', rm: '#e8f5e9', rr: '#e3f2fd', rp: '#f3e5f5' };
            return m[f] || '#eee';
        }
        function darkenColor(f) {
            const m = { lp: '#9c27b0', lr: '#2196f3', lm: '#4caf50', li: '#ff9800', lt: '#f44336', rt: '#f44336', ri: '#ff9800', rm: '#4caf50', rr: '#2196f3', rp: '#9c27b0' };
            return m[f] || '#ccc';
        }

        // ── Zone labels: 左手区 / 右手区 ──────────────────────────
        // The split falls between T (left-index) and Y (right-index).
        // T ends at: keyX(1,4) + KW = 0 + 4*(44)+8+40 = ~224
        // Y starts at: keyX(1,5) = 0 + 5*44+8 = ~228
        // Midpoint ≈ 226.  Left centre ≈ 113, Right centre ≈ 400
        function addSvgText(parent, x, y, text, size, fill, weight) {
            const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            t.setAttribute('x', x); t.setAttribute('y', y);
            t.setAttribute('text-anchor', 'middle');
            t.setAttribute('fill', fill); t.setAttribute('font-size', size);
            t.setAttribute('font-weight', weight || 600);
            t.setAttribute('font-family', 'Noto Sans SC,Inter,sans-serif');
            t.setAttribute('pointer-events', 'none');
            t.textContent = text;
            parent.appendChild(t); return t;
        }

        // ── Custom-shaped Zone Borders ──────────────────────────
        function addZonePath(side, color, label) {
            const isRight = side === 'right';
            const innerPad = 2; // Keeps the gap between the two boxes at 4px (since key gap is 8px)
            const outerPad = 6; // Increases padding on top, bottom, and outer sides

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

            // X-Coordinates for each row's split and outer edges
            const splitX = (row) => keyX(row, (row === 0 ? 5 : 4)) + KW + innerPad;
            const rSplitX = (row) => keyX(row, (row === 0 ? 6 : 5)) - innerPad;

            // Outer edges for each row
            const outerL = (row) => keyX(row, 0) - outerPad;
            const outerR = (row) => {
                const rowKeys = ROWS[row].length;
                return keyX(row, rowKeys - 1) + KW + outerPad;
            };

            let d = "";
            const bottomY = KY[3] + KH + outerPad;

            if (isRight) {
                // Right Zone Path
                const inner = (r) => rSplitX(r);
                const outer = (r) => outerR(r);

                d = `M ${inner(0)},${KY[0] - outerPad} `;
                // Top edge
                d += `H ${outer(0)} `;
                // Outer staggered edge (Right side)
                for (let i = 0; i <= 3; i++) {
                    d += `V ${KY[i] + KH + outerPad} H ${outer(i + 1 === 4 ? 3 : i + 1)} `;
                }
                d += `V ${bottomY} H ${inner(3)} `;
                // Inner staggered edge (Left side)
                for (let i = 3; i >= 1; i--) {
                    d += `V ${KY[i] - innerPad} H ${inner(i - 1)} `;
                }
                d += `Z`;
            } else {
                // Left Zone Path
                const outer = (r) => outerL(r);
                const inner = (r) => splitX(r);

                d = `M ${outer(0)},${KY[0] - outerPad} `;
                // Top edge
                d += `H ${inner(0)} `;
                // Inner staggered edge (Right side)
                for (let i = 0; i <= 2; i++) {
                    d += `V ${KY[i] + KH + innerPad} H ${inner(i + 1)} `;
                }
                d += `V ${bottomY} H ${outer(3)} `;
                // Outer staggered edge (Left side)
                for (let i = 3; i >= 1; i--) {
                    d += `V ${KY[i] - outerPad} H ${outer(i - 1)} `;
                }
                d += `Z`;
            }

            svgEl('path', {
                d, fill: color + '12', stroke: color,
                'stroke-width': 1.2, 'stroke-linejoin': 'round'
            }, g);

            // Label above the border
            const labelX = isRight ? 480 : 100;
            const labelY = KY[0] - 12; // Floating above row 0
            addSvgText(g, labelX, labelY, label, 10, color, 800);

            svg.appendChild(g);
        }

        addZonePath('left', '#fb8c00', '← 左手区');
        addZonePath('right', '#1a73e8', '右手区 →');

        // Legend
        const legendEl = document.getElementById('legend');
        const legendDefs = [
            { label: '小指', color: '#9c27b0' },
            { label: '无名指', color: '#2196f3' },
            { label: '中指', color: '#4caf50' },
            { label: '食指', color: '#ff9800' },
            { label: '拇指', color: '#f44336' },
        ];
        legendDefs.forEach(({ label, color }) => {
            const div = document.createElement('div');
            div.className = 'legend-item';
            div.innerHTML = `<div class="legend-dot" style="background:${color}"></div>${label}`;
            legendEl.appendChild(div);
        });

        /* ====================================================
           SVG HAND DIAGRAM  –  realistic bezier hand design
        ==================================================== */
        const handSvg = document.getElementById('hands-svg');

        // Helper: append an SVG element with attributes
        function svgEl(tag, attrs, parent) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
            (parent || handSvg).appendChild(el);
            return el;
        }

        function addSvgText(parent, x, y, text, size, color, weight) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            el.setAttribute('x', x); el.setAttribute('y', y);
            el.setAttribute('text-anchor', 'middle');
            el.setAttribute('fill', color || '#9aa0a6');
            el.setAttribute('font-size', size || 10);
            el.setAttribute('font-weight', weight || 400);
            el.setAttribute('font-family', 'Noto Sans SC,sans-serif');
            el.setAttribute('pointer-events', 'none');
            el.textContent = text;
            (parent || handSvg).appendChild(el);
            return el;
        }

        /**
         * Draw a simple icon-style hand as a single closed SVG path.
         * For the left hand, fingers go: pinky(left) → index(right), thumb lower-right.
         * Right hand is mirrored via SVG transform.
         * Returns {tipCenters} with world-space coordinates for finger dot placement.
         */
        function drawIconHand(cx, direction) {
            const isRight = direction === 'right';
            // Mirror the right hand by flipping around cx
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            handSvg.appendChild(g);
            if (isRight) g.setAttribute('transform', `scale(-1,1) translate(${-cx * 2}, 0)`);

            // All coordinates are for the LEFT hand.
            // Fingers left→right: pinky, ring, middle, index. Thumb on right side.
            // Single closed outline path (fill + stroke together = one-stroke hand icon).
            const x = cx;  // palm horizontal center
            const y = 195; // wrist y (bottom)

            // Finger tip y positions (measured from top of SVG)
            const pTip = 78, rTip = 58, mTip = 46, iTip = 62; // pinky/ring/mid/index tip
            const pW = 7, rW = 9, mW = 9, iW = 8; // half-widths
            // Finger center x positions relative to palm center
            const pX = x - 33, rX = x - 16, mX = x + 1, iX = x + 18;
            // Valley Y between fingers (U-shaped dips in the outline)
            const vY = 105;
            // Palm sides
            const palmL = x - 39, palmR = x + 35;
            // Wrist bottom y
            const wY = y + 2;

            // The thumb: sticks out from the right side of the palm
            // Thumb tip (in left-hand space) is to the right and up
            const thTipX = x + 62, thTipY = y - 57;

            const d = [
                // Start: wrist bottom-left
                `M ${palmL} ${wY}`,
                // Up left side of palm
                `C ${palmL} ${y - 20} ${palmL - 2} ${y - 55} ${pX - pW} ${vY}`,
                // Up left side of pinky
                `L ${pX - pW} ${pTip + pW * 1.5}`,
                // Round pinky tip
                `Q ${pX - pW} ${pTip} ${pX} ${pTip}`,
                `Q ${pX + pW} ${pTip} ${pX + pW} ${pTip + pW * 1.5}`,
                // Down right of pinky, valley, up left ring
                `C ${pX + pW} ${vY} ${rX - rW} ${vY} ${rX - rW} ${vY - 4}`,
                `L ${rX - rW} ${rTip + rW * 1.5}`,
                // Round ring tip
                `Q ${rX - rW} ${rTip} ${rX} ${rTip}`,
                `Q ${rX + rW} ${rTip} ${rX + rW} ${rTip + rW * 1.5}`,
                // Down right of ring, valley, up left middle
                `C ${rX + rW} ${vY} ${mX - mW} ${vY} ${mX - mW} ${vY - 6}`,
                `L ${mX - mW} ${mTip + mW * 1.5}`,
                // Round middle tip
                `Q ${mX - mW} ${mTip} ${mX} ${mTip}`,
                `Q ${mX + mW} ${mTip} ${mX + mW} ${mTip + mW * 1.5}`,
                // Down right of middle, valley, up left index
                `C ${mX + mW} ${vY} ${iX - iW} ${vY} ${iX - iW} ${vY - 4}`,
                `L ${iX - iW} ${iTip + iW * 1.5}`,
                // Round index tip
                `Q ${iX - iW} ${iTip} ${iX} ${iTip}`,
                `Q ${iX + iW} ${iTip} ${iX + iW} ${iTip + iW * 1.5}`,
                // Down right of index to right side of palm → into thumb web
                `C ${iX + iW} ${vY} ${palmR} ${y - 60} ${palmR} ${y - 38}`,
                // Curve toward thumb base
                `C ${palmR} ${y - 20} ${x + 38} ${y - 12} ${x + 34} ${y - 18}`,
                // Up right side of thumb
                `C ${x + 38} ${y - 30} ${thTipX + 4} ${thTipY + 12} ${thTipX} ${thTipY}`,
                // Round thumb tip
                `Q ${thTipX - 4} ${thTipY - 8} ${thTipX - 10} ${thTipY - 2}`,
                // Down left side of thumb back to palm
                `C ${thTipX - 14} ${thTipY + 12} ${x + 24} ${y - 30} ${x + 20} ${y - 14}`,
                // Down right palm to wrist
                `C ${x + 22} ${y - 4} ${palmR - 10} ${wY} ${palmR} ${wY}`,
                // Wrist bottom curve
                `Q ${cx} ${wY + 10} ${palmL} ${wY}`,
                `Z`
            ].join(' ');

            svgEl('path', {
                d,
                fill: '#f0ebe4',
                stroke: '#b0a090',
                'stroke-width': 2,
                'stroke-linejoin': 'round',
                'stroke-linecap': 'round'
            }, g);

            // Wrist line hint
            svgEl('line', {
                x1: palmL + 8, y1: wY,
                x2: palmR - 8, y2: wY,
                stroke: '#c0b0a0', 'stroke-width': 1, 'stroke-linecap': 'round'
            }, g);

            // Return world-space tip centers (accounting for mirror transform)
            const mirror = (wx) => isRight ? cx * 2 - wx : wx;
            return {
                tipCenters: {
                    [isRight ? 'rp' : 'lp']: { cx: mirror(pX), cy: pTip },
                    [isRight ? 'rr' : 'lr']: { cx: mirror(rX), cy: rTip },
                    [isRight ? 'rm' : 'lm']: { cx: mirror(mX), cy: mTip },
                    [isRight ? 'ri' : 'li']: { cx: mirror(iX), cy: iTip },
                    [isRight ? 'rt' : 'lt']: { cx: mirror(thTipX - 5), cy: thTipY },
                }
            };
        }

        // Draw both hands. ViewBox 520 wide; left center ~130, right ~390.
        const leftResult = drawIconHand(130, 'left');
        const rightResult = drawIconHand(390, 'right');

        // Labels
        addSvgText(handSvg, 130, 218, '左手', 11, '#9aa0a6', 600);
        addSvgText(handSvg, 390, 218, '右手', 11, '#9aa0a6', 600);

        // Collect tip centers
        const allTips = { ...leftResult.tipCenters, ...rightResult.tipCenters };
        const fingerTips = Object.entries(allTips).map(([id, pos]) => ({ id, ...pos }));

        // Draw fingertip coloured circles – semi-transparent by default
        const ftipMap = {};
        fingerTips.forEach(({ id, cx, cy }) => {
            const color = fingerColor[id];
            const c = svgEl('circle', {
                cx, cy, r: 10,
                fill: color, stroke: '#fff', 'stroke-width': 1.5,
                opacity: 0.2,
                class: 'ftip'
            });
            ftipMap[id] = c;
        });

        function darkenColor2(hex) { return hex; }

        /* ====================================================
           HIGHLIGHT HELPERS
        ==================================================== */
        let currentHighlightKey = null;
        let currentHighlightFinger = null;

        function highlightKey(letter) {
            // Clear previous
            clearHighlights();

            const k = letter.toUpperCase();
            const el = keyElements[k === ' ' ? 'SPACE' : k];
            if (!el) return;

            if (el.isMultiple) {
                el.rect.forEach(r => {
                    r.setAttribute('fill', '#1a73e8');
                    r.setAttribute('stroke', '#0d47a1');
                });
                el.txt.forEach(t => t.setAttribute('fill', '#fff'));
            } else {
                el.rect.setAttribute('fill', '#1a73e8');
                el.rect.setAttribute('stroke', '#0d47a1');
                el.txt.setAttribute('fill', '#fff');
            }
            currentHighlightKey = el;

            // Light up the matching finger in its own colour at full opacity
            const fCode = fingerMap[k] || fingerMap[' '];
            if (fCode) {
                const circ = ftipMap[fCode];
                if (circ) {
                    circ.setAttribute('r', 13);
                    circ.setAttribute('opacity', '1');
                    circ.setAttribute('fill', fingerColor[fCode]);
                    circ.setAttribute('stroke', '#fff');
                    currentHighlightFinger = circ;
                }
            }
        }

        function clearHighlights() {
            if (currentHighlightKey) {
                if (currentHighlightKey.isMultiple) {
                    currentHighlightKey.rect.forEach(r => {
                        r.setAttribute('fill', currentHighlightKey.origFill);
                        r.setAttribute('stroke', currentHighlightKey.origStroke);
                    });
                    currentHighlightKey.txt.forEach(t => t.setAttribute('fill', '#333'));
                } else {
                    currentHighlightKey.rect.setAttribute('fill', currentHighlightKey.origFill);
                    currentHighlightKey.rect.setAttribute('stroke', currentHighlightKey.origStroke);
                    currentHighlightKey.txt.setAttribute('fill', '#333');
                }
                currentHighlightKey = null;
            }
            if (currentHighlightFinger) {
                currentHighlightFinger = null;
            }
            // Reset ALL finger tips to semi-transparent
            fingerTips.forEach(({ id }) => {
                const c = ftipMap[id];
                if (c) {
                    c.setAttribute('r', 9);
                    c.setAttribute('fill', fingerColor[id]);
                    c.setAttribute('stroke', '#fff');
                    c.setAttribute('opacity', '0.2');
                }
            });
        }

        /* ====================================================
           WORD / CHAR DISPLAY
        ==================================================== */
        const targetWordEl = document.getElementById('target-word');
        const statusHint = document.getElementById('status-hint');
        const progressFill = document.getElementById('progress-fill');
        const progressLabel = document.getElementById('progress-label');
        const btnNext = document.getElementById('btn-next');

        function renderWord(word) {
            targetWordEl.innerHTML = '';
            word.split('').forEach((ch, i) => {
                const box = document.createElement('div');
                box.className = 'char-box' + (i === 0 ? ' active' : '');
                box.id = 'char-' + i;
                box.textContent = ch.toUpperCase();
                targetWordEl.appendChild(box);
            });
        }

        function getCharBox(i) { return document.getElementById('char-' + i); }

        function updateStatus(ch) {
            const fCode = fingerMap[ch.toUpperCase()];
            const name = fCode ? fingerName[fCode] : '';
            statusHint.innerHTML = name
                ? `用 <span>${name}</span> 按下 <span>${ch.toUpperCase()}</span>`
                : '按下 <span>空格</span> 继续';
        }

        function updateProgress() {
            const pct = totalWords ? Math.round((wordsDone / totalWords) * 100) : 0;
            progressFill.style.width = pct + '%';
            progressLabel.textContent = wordsDone + ' / ' + totalWords + ' 词';
        }

        /* ====================================================
           GAME LOGIC
        ==================================================== */
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-homerow').classList.toggle('active', mode === 'homerow');
            document.getElementById('btn-pinyin').classList.toggle('active', mode === 'pinyin');

            wordList = shuffle([...WORD_LISTS[mode]]);
            wordIndex = 0;
            wordsDone = 0;
            totalWords = wordList.length;
            btnNext.style.display = 'none';
            loadWord();
            updateProgress();
        }

        function loadWord() {
            if (wordIndex >= wordList.length) {
                // All done – cycle again
                wordList = shuffle([...WORD_LISTS[currentMode]]);
                wordIndex = 0;
                wordsDone = 0;
            }
            currentWord = wordList[wordIndex];
            charIndex = 0;
            renderWord(currentWord);
            highlightKey(currentWord[0]);
            updateStatus(currentWord[0]);
            btnNext.style.display = 'none';
        }

        function nextWord() {
            wordIndex++;
            wordsDone++;
            updateProgress();
            loadWord();
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        /* ====================================================
           KEYBOARD INPUT LISTENER
        ==================================================== */
        document.addEventListener('keydown', e => {
            // Ignore modifier combos
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            // Only letters + space
            const key = e.key;
            if (key.length !== 1 && key !== 'Backspace') return;
            if (key === 'Backspace') return; // no backspace support by design

            // Word complete check must come FIRST to avoid TypeError
            if (charIndex >= currentWord.length) {
                if (key === ' ') {
                    nextWord();
                }
                e.preventDefault();
                return;
            }

            const expected = currentWord[charIndex].toUpperCase();
            const pressed = key.toUpperCase();

            if (pressed === expected) {
                // Correct
                playOK();
                const box = getCharBox(charIndex);
                box.classList.remove('active');
                box.classList.add('done');

                charIndex++;
                if (charIndex >= currentWord.length) {
                    // Word complete
                    clearHighlights();
                    statusHint.innerHTML = '✅ 完成！按下 <span>空格</span> 继续下一个词';
                    btnNext.style.display = 'inline-block';
                    highlightKey(' '); // Highlight space bar to prompt
                } else {
                    const nextCh = currentWord[charIndex];
                    getCharBox(charIndex).classList.add('active');
                    highlightKey(nextCh);
                    updateStatus(nextCh);
                }
            } else {
                // Wrong
                playError();
                const box = getCharBox(charIndex);
                box.classList.add('wrong');
                // Flash red then restore active
                setTimeout(() => {
                    box.classList.remove('wrong');
                    box.classList.add('active');
                }, 320);
                statusHint.innerHTML = `❌ 按错了！请用 <span>${fingerName[fingerMap[expected]] || ''}</span> 按 <span>${expected}</span>`;
            }

            e.preventDefault();
        });

        /* ====================================================
           INIT
        ==================================================== */
        setMode('homerow');
    </script>
</body>

</html>

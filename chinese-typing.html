<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文打字速度测试 | 徐悦泽</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --primary: #1a73e8;
            --primary-light: rgba(26, 115, 232, 0.08);
            --text: #202124;
            --text-muted: #5f6368;
            --correct: #34A853;
            --wrong: #EA4335;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .ct-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 60px;
        }

        .ct-back {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .ct-back:hover {
            color: var(--primary);
        }

        .ct-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        /* ── Auth button (shared styles) ── */
        .auth-btn {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .auth-btn--user {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .auth-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ── Main layout ── */
        .ct-main {
            max-width: 820px;
            margin: 0 auto;
            padding: 90px 24px 60px;
        }

        /* ── Passage selector ── */
        .ct-passage-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .ct-passage-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .ct-passage-btn {
            font-size: 0.82rem;
            padding: 5px 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .ct-passage-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Stats bar ── */
        .ct-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .ct-stat {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 16px 20px;
            text-align: center;
            transition: box-shadow 0.3s;
        }

        .ct-stat:hover {
            box-shadow: var(--shadow);
        }

        .ct-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .ct-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'Inter', monospace;
            transition: color 0.3s;
        }

        #timerDisplay.warning {
            color: var(--wrong);
        }

        /* ── Typing card ── */
        .ct-card {
            background: var(--surface);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 36px 40px;
            cursor: text;
            position: relative;
            transition: box-shadow 0.3s;
            min-height: 180px;
        }

        .ct-card:focus-within {
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15), var(--shadow);
        }

        .ct-card.test-active {
            border-color: rgba(26, 115, 232, 0.3);
        }

        /* ── Typing text ── */
        .ct-text {
            font-size: 1.5rem;
            line-height: 2.2;
            letter-spacing: 0.05em;
            user-select: none;
        }

        .char {
            position: relative;
            transition: color 0.1s;
        }

        .char-pending {
            color: #c0c4cc;
        }

        .char-correct {
            color: var(--correct);
        }

        .char-wrong {
            color: var(--wrong);
        }

        .char-current {
            color: var(--text);
            text-decoration: underline;
            text-decoration-color: var(--primary);
            text-underline-offset: 3px;
            animation: blink-underline 1s infinite;
        }

        @keyframes blink-underline {

            0%,
            100% {
                text-decoration-color: var(--primary);
            }

            50% {
                text-decoration-color: transparent;
            }
        }

        /* ── Hint overlay ── */
        .ct-hint {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            color: var(--text-muted);
            gap: 10px;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        .ct-hint .hint-icon {
            font-size: 2.5rem;
        }

        .ct-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ── Hidden textarea ── */
        .ct-textarea {
            position: absolute;
            opacity: 0;
            left: -9999px;
            width: 1px;
            height: 1px;
        }

        /* ── Controls ── */
        .ct-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .ct-restart-btn {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 24px;
            border: 1.5px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ct-restart-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* ── Login nudge ── */
        .ct-login-nudge {
            text-align: center;
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .ct-login-nudge a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }

        /* ── Result modal ── */
        .result-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .result-modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 44px 48px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .result-emoji {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .result-scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .result-score-item {
            background: var(--bg);
            border-radius: 14px;
            padding: 16px;
        }

        .result-score-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .result-score-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Inter', sans-serif;
        }

        .result-record {
            font-size: 0.85rem;
            color: var(--correct);
            background: rgba(52, 168, 83, 0.08);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: inline-block;
        }

        .result-not-saved {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .result-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .result-btn {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .result-btn--primary {
            background: var(--primary);
            color: white;
        }

        .result-btn--primary:hover {
            background: #1557b0;
        }

        .result-btn--secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .result-btn--secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Auth modal (shared) ── */
        .auth-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 44px 40px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .auth-modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .auth-modal-close:hover {
            background: var(--bg);
        }

        .auth-modal-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .auth-modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-modal-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .auth-modal-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .auth-provider-btn {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .auth-provider-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .auth-provider-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .ct-card {
                padding: 24px 20px;
            }

            .ct-text {
                font-size: 1.25rem;
                line-height: 2;
            }

            .ct-stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <header class="ct-header">
        <a href="index.html" class="ct-back">← 返回主页</a>
        <span class="ct-title">中文打字速度测试</span>
        <div id="auth-btn-container"></div>
    </header>

    <main class="ct-main">
        <div class="ct-passage-bar">
            <span class="ct-passage-label" id="passageLabel">随机段落 1 / 6</span>
            <button class="ct-passage-btn" id="changePassageBtn">换一段 🔀</button>
        </div>

        <div class="ct-stats">
            <div class="ct-stat">
                <div class="ct-stat-label">⏱ 剩余时间</div>
                <div class="ct-stat-value" id="timerDisplay">60</div>
            </div>
            <div class="ct-stat">
                <div class="ct-stat-label">⌨ 速度 (字/分)</div>
                <div class="ct-stat-value" id="wpmDisplay">--</div>
            </div>
            <div class="ct-stat">
                <div class="ct-stat-label">✓ 正确率</div>
                <div class="ct-stat-value" id="accDisplay">--%</div>
            </div>
        </div>

        <div class="ct-card" id="ctCard">
            <div class="ct-text" id="ctText"></div>
            <div class="ct-hint" id="ctHint">
                <span class="hint-icon">⌨️</span>
                <span>点击此处 开始打字</span>
                <span style="font-size:0.8rem;margin-top:4px">支持拼音输入法</span>
            </div>
            <textarea class="ct-textarea" id="ctInput" autocomplete="off" autocorrect="off" autocapitalize="off"
                spellcheck="false"></textarea>
        </div>

        <div class="ct-controls">
            <button class="ct-restart-btn" id="restartBtn">↺ 重新开始</button>
        </div>
        <div class="ct-login-nudge" id="loginNudge" style="display:none">
            <a id="nudgeLoginLink">登录账号</a> 以保存你的打字成绩
        </div>
    </main>

    <script type="module">
        import { getCurrentUser, renderAuthButton, saveTypingScore, loginWithGoogle } from './auth.js';

        // ── Passages ─────────────────────────────────────────────────────
        const PASSAGES = [
            '在这个信息爆炸的时代，科技正在以前所未有的速度改变着我们的生活方式。从人工智能到大数据，从云计算到物联网，每一项技术创新都在推动社会向前发展。我们既是变革的受益者，也是这场变革的积极参与者。',
            '教育是人类文明传承的基石。一位好的老师不仅传授知识，更能点燃学生内心对求知的渴望。真正的学习不是填满一个容器，而是点燃一把火焰。在这个快速变化的世界里，学会如何学习，比学什么更加重要。',
            '大自然是最伟大的艺术家。清晨的薄雾笼罩着山峦，阳光穿透云层洒下金色的光芒。溪水潺潺地流过青石，鸟儿在枝头欢快地鸣叫。在喧嚣的城市生活中，我们更需要亲近自然，让心灵在绿意中得到休憩。',
            '创业的本质是发现问题并创造价值。真正好的商业模式，是在解决用户痛点的同时，建立起可持续的盈利机制。在激烈的市场竞争中，那些能够持续创新、快速迭代的企业，才能在时代浪潮中站稳脚跟。',
            '生活中最美好的事情，往往是那些简单却充实的瞬间。一杯热茶，一本好书，一段悠然的音乐，足以让人忘却烦恼。学会在平凡中发现美好，在忙碌中保持从容，是现代人最需要修炼的一门功课。',
            '阅读是与智者对话的最好方式。每一本书都是一扇通往新世界的门，等待着有心人去推开。当我们沉浸在文字的海洋中，时间仿佛静止了，而思维却在悄悄地扩展边界，探索那些未曾涉足的精神领域。'
        ];

        // ── State ─────────────────────────────────────────────────────────
        let targetText = '';
        let passageIndex = 0;
        let startTime = null;
        let timerInterval = null;
        let timeLeft = 60;
        let isRunning = false;
        let isComposing = false;
        let testDone = false;

        const input = document.getElementById('ctInput');
        const textEl = document.getElementById('ctText');
        const hint = document.getElementById('ctHint');
        const card = document.getElementById('ctCard');
        const timerEl = document.getElementById('timerDisplay');
        const wpmEl = document.getElementById('wpmDisplay');
        const accEl = document.getElementById('accDisplay');

        // ── Render passage ─────────────────────────────────────────────────
        function loadPassage(idx) {
            passageIndex = idx;
            targetText = PASSAGES[idx];
            document.getElementById('passageLabel').textContent = `随机段落 ${idx + 1} / ${PASSAGES.length}`;
            textEl.innerHTML = targetText.split('').map((c, i) =>
                `<span class="char char-pending" data-i="${i}">${c}</span>`
            ).join('');
            resetTimer();
            input.value = '';
            hint.classList.remove('hidden');
            card.classList.remove('test-active');
            testDone = false;
        }

        // ── Timer ──────────────────────────────────────────────────────────
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startTime = null;
            timeLeft = 60;
            timerEl.textContent = '60';
            timerEl.classList.remove('warning');
            wpmEl.textContent = '--';
            accEl.textContent = '--%';
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startTime = Date.now();
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 10) timerEl.classList.add('warning');
                updateStats();
                if (timeLeft <= 0) finishTest();
            }, 1000);
        }

        // ── Stats update ───────────────────────────────────────────────────
        function updateStats() {
            const typed = input.value;
            const elapsed = startTime ? (Date.now() - startTime) / 1000 : 1;
            let correct = 0;
            typed.split('').forEach((ch, i) => { if (i < targetText.length && ch === targetText[i]) correct++; });
            const wpm = Math.round(correct * 60 / elapsed);
            const acc = typed.length > 0 ? Math.round(correct / typed.length * 100) : 100;
            wpmEl.textContent = wpm;
            accEl.textContent = acc + '%';
            // Update chars
            const chars = textEl.querySelectorAll('.char');
            chars.forEach((el, i) => {
                if (i < typed.length) {
                    el.className = 'char ' + (typed[i] === targetText[i] ? 'char-correct' : 'char-wrong');
                } else if (i === typed.length) {
                    el.className = 'char char-current';
                } else {
                    el.className = 'char char-pending';
                }
            });
            if (typed.length >= targetText.length) finishTest();
        }

        // ── Finish test ────────────────────────────────────────────────────
        function finishTest() {
            if (testDone) return;
            testDone = true;
            clearInterval(timerInterval);
            isRunning = false;
            input.disabled = true;

            const typed = input.value;
            const elapsed = startTime ? Math.max(1, (Date.now() - startTime) / 1000) : 60;
            let correct = 0;
            typed.split('').forEach((ch, i) => { if (i < targetText.length && ch === targetText[i]) correct++; });
            const wpm = Math.round(correct * 60 / elapsed);
            const acc = typed.length > 0 ? Math.round(correct / typed.length * 100) : 0;

            showResult(wpm, acc);
        }

        // ── Result modal ───────────────────────────────────────────────────
        function showResult(wpm, acc) {
            const user = getCurrentUser();
            let saveResult = null;
            if (user) {
                saveResult = saveTypingScore(wpm, acc);
            }

            const overlay = document.createElement('div');
            overlay.className = 'result-overlay';

            let recordHTML = '';
            if (saveResult?.saved) {
                recordHTML = `<div class="result-record">🏆 今日新纪录！</div>`;
            } else if (saveResult?.reason === 'not_best') {
                recordHTML = `<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:16px">今日最高：${saveResult.currentBest} 字/分（未超过）</div>`;
            } else if (!user) {
                recordHTML = `<div class="result-not-saved">⚠️ <a id="resultLoginLink" style="color:var(--primary);cursor:pointer">登录账号</a> 以保存成绩</div>`;
            }

            overlay.innerHTML = `
        <div class="result-modal">
            <div class="result-emoji">${wpm >= 60 ? '🎉' : wpm >= 40 ? '💪' : '📝'}</div>
            <div class="result-title">测试完成！</div>
            <div class="result-scores">
                <div class="result-score-item">
                    <div class="result-score-label">速度</div>
                    <div class="result-score-value">${wpm}</div>
                    <div style="font-size:0.75rem;color:var(--text-muted)">字/分钟</div>
                </div>
                <div class="result-score-item">
                    <div class="result-score-label">正确率</div>
                    <div class="result-score-value">${acc}%</div>
                    <div style="font-size:0.75rem;color:var(--text-muted)">准确度</div>
                </div>
            </div>
            ${recordHTML}
            <div class="result-btns">
                <button class="result-btn result-btn--secondary" id="resultRetry">↺ 再来一次</button>
                ${user ? `<a href="profile.html" class="result-btn result-btn--primary">查看成绩历史</a>` : ''}
            </div>
        </div>`;
            document.body.appendChild(overlay);

            document.getElementById('resultRetry').addEventListener('click', () => {
                overlay.remove();
                loadPassage(passageIndex);
                input.disabled = false;
                input.focus();
                hint.classList.remove('hidden');
            });
            document.getElementById('resultLoginLink')?.addEventListener('click', async () => {
                overlay.remove();
                try {
                    await loginWithGoogle();
                    renderAuthButton();
                    updateLoginNudge();
                } catch (e) { alert('登录失败，请通过 Live Server 或 HTTPS 域名访问此页面。'); }
            });
        }

        // ── Input handling ─────────────────────────────────────────────────
        input.addEventListener('compositionstart', () => { isComposing = true; });
        input.addEventListener('compositionend', () => {
            isComposing = false;
            if (!isRunning && !testDone) startTimer();
            updateStats();
        });
        input.addEventListener('input', () => {
            if (isComposing) return;
            if (!isRunning && !testDone) startTimer();
            updateStats();
        });

        // ── Click card to focus ────────────────────────────────────────────
        card.addEventListener('click', () => {
            if (testDone) return;
            hint.classList.add('hidden');
            card.classList.add('test-active');
            input.focus();
        });

        // ── Change passage ─────────────────────────────────────────────────
        document.getElementById('changePassageBtn').addEventListener('click', () => {
            const next = (passageIndex + 1) % PASSAGES.length;
            loadPassage(next);
            input.disabled = false;
        });

        // ── Restart ────────────────────────────────────────────────────────
        document.getElementById('restartBtn').addEventListener('click', () => {
            loadPassage(passageIndex);
            input.disabled = false;
        });

        // ── Login nudge ────────────────────────────────────────────────────
        function updateLoginNudge() {
            const user = getCurrentUser();
            const nudge = document.getElementById('loginNudge');
            nudge.style.display = user ? 'none' : 'block';
            if (!user) {
                document.getElementById('nudgeLoginLink').addEventListener('click', async () => {
                    try {
                        await loginWithGoogle();
                        renderAuthButton();
                        updateLoginNudge();
                    } catch (e) { alert('登录失败。'); }
                });
            }
        }

        // ── Init ──────────────────────────────────────────────────────────
        loadPassage(Math.floor(Math.random() * PASSAGES.length));
        renderAuthButton();
        updateLoginNudge();

        // Expose for auth.js callback
        window.onAuthSuccess = () => { renderAuthButton(); updateLoginNudge(); };
    </script>
</body>

</html>
